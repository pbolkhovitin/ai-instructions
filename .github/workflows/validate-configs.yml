---
name: Validate Configuration Files

on:
  push:
    branches: [main, develop]
    paths:
      - 'instructions/**'
      - 'configs/**'
      - 'schemas/**'
      - 'services/**'
      - 'tests/**'
      - '.github/workflows/validate-configs.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'instructions/**'
      - 'configs/**'
      - 'schemas/**'
      - 'services/**'
      - 'tests/**'
  workflow_dispatch: true

jobs:
  validate-configs:
    name: Validate JSON Configs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema aiohttp aiofiles
          pip list

      - name: Verify repository structure
        run: |
          echo "📁 Проверка структуры репозитория:"
          ls -la
          echo "Instructions:"
          ls -la instructions/ || echo "❌ Директория instructions не найдена"
          echo "Configs:"
          ls -la configs/ || echo "❌ Директория configs не найдена"
          echo "Schemas:"
          ls -la schemas/ || echo "❌ Директория schemas не найдена"
          echo "Services:"
          ls -la services/ || echo "❌ Директория services не найдена"

      - name: Run basic JSON syntax validation
        run: |
          echo "🔍 Проверка синтаксиса JSON файлов..."
          
          for file in instructions/*.json; do
            if [ -f "$file" ]; then
              python -m json.tool "$file" > /dev/null && echo "✅ $file" || { echo "❌ $file"; exit 1; }
            fi
          done
          
          for file in configs/*.json; do
            if [ -f "$file" ]; then
              python -m json.tool "$file" > /dev/null && echo "✅ $file" || { echo "❌ $file"; exit 1; }
            fi
          done
          
          find schemas/ -name "*.json" -exec bash -c '
            for file; do
              python -m json.tool "$file" > /dev/null && echo "✅ $file" || { echo "❌ $file"; exit 1; }
            done
          ' bash {} +

      - name: Run P0 validation tests
        run: |
          echo "🧪 Запуск P0 тестов валидации..."
          python tests/test_p0_validation.py
          if [ $? -eq 0 ]; then
            echo "✅ P0 тесты пройдены успешно"
          else
            echo "❌ P0 тесты провалены"
            exit 1
          fi

      - name: Validate all instruction files
        run: |
          echo "📋 Валидация всех файлов инструкций..."
          python -c "
import asyncio
import os
from services.config_loader import ValidatedConfigLoader, ConfigValidationError

async def validate_instructions():
    loader = ValidatedConfigLoader()
    await loader.initialize()
    
    success = True
    for file in os.listdir('instructions'):
        if file.endswith('.json') and 'deepseek_instructions' in file:
            try:
                await loader.load_and_validate(f'instructions/{file}')
                print(f'✅ instructions/{file}')
            except Exception as e:
                print(f'❌ instructions/{file}: {e}')
                success = False
    
    return success

result = asyncio.run(validate_instructions())
exit(0 if result else 1)
          "

      - name: Validate all context configs
        run: |
          echo "🎯 Валидация всех конфигов контекста..."
          python -c "
import asyncio
import os
from services.config_loader import ValidatedConfigLoader

async def validate_context_configs():
    loader = ValidatedConfigLoader()
    await loader.initialize()
    
    success = True
    for file in os.listdir('configs'):
        if file.endswith('.json') and file.startswith('context_config_'):
            try:
                await loader.load_and_validate(f'configs/{file}')
                print(f'✅ configs/{file}')
            except Exception as e:
                print(f'❌ configs/{file}: {e}')
                success = False
    
    return success

result = asyncio.run(validate_context_configs())
exit(0 if result else 1)
          "

      - name: Validate schema files consistency
        run: |
          echo "🔧 Проверка согласованности схем..."
          python -c "
import json
import os

def check_schemas_consistency():
    schemas_dir = 'schemas'
    
    for schema_type in ['context-config', 'deepseek-instructions']:
        latest_path = f'{schemas_dir}/{schema_type}/latest.schema.json'
        if os.path.exists(latest_path):
            if os.path.islink(latest_path):
                target = os.readlink(latest_path)
                if not os.path.exists(os.path.join(os.path.dirname(latest_path), target)):
                    print(f'❌ Симлинк {latest_path} ведет на несуществующий файл: {target}')
                    return False
                else:
                    print(f'✅ Симлинк {latest_path} -> {target}')
            else:
                print(f'⚠️  {latest_path} не является симлинком')
        else:
            print(f'⚠️  {latest_path} не найден')
    
    return True

exit(0 if check_schemas_consistency() else 1)
          "

      - name: Run additional validation tests
        run: |
          echo "🧪 Дополнительные тесты валидации..."
          python -c "
import json
import os

def check_required_fields():
    required_fields = {
        'context-config': ['meta', 'key_data'],
        'deepseek-instructions': ['config_version', 'protocol_version', 'role']
    }
    
    for schema_type, fields in required_fields.items():
        schema_path = f'schemas/{schema_type}/v1.5.schema.json'
        if os.path.exists(schema_path):
            with open(schema_path, 'r') as f:
                schema = json.load(f)
            
            for field in fields:
                if field not in str(schema):
                    print(f'❌ В схеме {schema_type} отсутствует упоминание поля: {field}')
                    return False
    
    return True

exit(0 if check_required_fields() else 1)
          "

      - name: Create validation report
        if: always()
        run: |
          echo "📊 Отчет о валидации конфигураций"
          echo "=========================================="
          echo "Python version: ${{ matrix.python-version }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "=========================================="
          
          instructions_count=$(find instructions/ -name "*.json" | wc -l)
          configs_count=$(find configs/ -name "*.json" | wc -l)
          schemas_count=$(find schemas/ -name "*.json" | wc -l)
          
          echo "📁 Инструкций: $instructions_count"
          echo "📁 Конфигов: $configs_count"
          echo "📁 Схем: $schemas_count"
          echo "=========================================="

      - name: Upload validation artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-error-details
          path: |
            instructions/
            configs/
            schemas/
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: validate-configs
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install jsonschema aiohttp aiofiles

      - name: Run integration tests
        run: |
          echo "🔗 Запуск интеграционных тестов..."
          python -c "
import asyncio
from services.config_loader import ValidatedConfigLoader

async def integration_test():
    print('1. Тест инициализации...')
    loader = ValidatedConfigLoader()
    await loader.initialize()
    print('✅ Инициализация успешна')
    
    print('2. Тест загрузки инструкций...')
    instructions = await loader.load_and_validate('instructions/deepseek_instructions_v1.5.json')
    assert 'config_version' in instructions
    print('✅ Загрузка инструкций успешна')
    
    print('3. Тест загрузки конфигов...')
    import os
    config_files = [f for f in os.listdir('configs') if f.endswith('.json') and f.startswith('context_config_')]
    if config_files:
        config = await loader.load_and_validate(f'configs/{config_files[0]}')
        assert 'meta' in config
        print(f'✅ Загрузка конфига {config_files[0]} успешна')
    
    print('4. Тест обработки ошибок...')
    try:
        await loader.load_and_validate('nonexistent.json')
        assert False, 'Ожидалась ошибка для несуществующего файла'
    except:
        print('✅ Обработка ошибок работает корректно')
    
    print('🎉 Все интеграционные тесты пройдены!')

asyncio.run(integration_test())
          "

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

    - name: Validate saved config
  run: python -c "import asyncio; from services.config_loader import ValidatedConfigLoader; asyncio.run((async lambda: await ValidatedConfigLoader().load_and_validate('configs/context_config_proaktinyi-ekspertnyi-asistent.json'))())"