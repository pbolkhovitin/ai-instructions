# tests/test_quality_metrics.py
"""
Тесты для мониторинга качества валидации
"""

import pytest
import json
from pathlib import Path
from services.config_loader import ValidatedConfigLoader
from services.schema_manager import SchemaManager

class TestQualityMetrics:
    """Тесты метрик качества валидации"""
    
    @pytest.fixture
    def loader(self):
        return ValidatedConfigLoader()
    
    @pytest.fixture
    def schema_manager(self):
        return SchemaManager()
    
    def test_validation_performance(self, loader):
        """Тест производительности валидации"""
        import time
        
        # Тестовый конфиг
        test_config = {
            "config_version": "1.5.1",
            "protocol_version": "1.5",
            "role": "Test Role",
            "style": "Test Style",
            "primary_goal": "Test Goal"
        }
        
        # Измеряем время валидации
        start_time = time.time()
        
        for _ in range(100):  # 100 итераций для статистики
            try:
                loader._validate_with_schema(test_config, "context_config")
            except:
                pass
        
        end_time = time.time()
        avg_time = (end_time - start_time) * 1000 / 100  # мс на валидацию
        
        # Проверяем что валидация быстрая (<10ms в среднем)
        assert avg_time < 10, f"Validation too slow: {avg_time:.2f}ms"
    
    def test_memory_usage(self, loader):
        """Тест использования памяти"""
        import psutil
        import os
        
        process = psutil.Process(os.getpid())
        initial_memory = process.memory_info().rss / 1024 / 1024  # MB
        
        # Загружаем несколько конфигов
        for i in range(50):
            test_config = {
                "config_version": f"1.5.{i}",
                "protocol_version": "1.5",
                "role": f"Test Role {i}",
                "style": "Test Style"
            }
            try:
                loader._validate_with_schema(test_config, "context_config")
            except:
                pass
        
        final_memory = process.memory_info().rss / 1024 / 1024
        memory_increase = final_memory - initial_memory
        
        # Проверяем что утечек памяти нет
        assert memory_increase < 5, f"Memory leak detected: {memory_increase:.2f}MB increase"
    
    def test_error_handling_quality(self, loader):
        """Тест качества обработки ошибок"""
        invalid_configs = [
            {"no_version": "invalid"},  # Нет config_version
            {"config_version": 123},    # Неправильный тип
            {},                         # Пустой конфиг
            {"config_version": "1.5.1", "unknown_field": "value"}  # Неизвестное поле
        ]
        
        for i, config in enumerate(invalid_configs):
            try:
                loader._validate_with_schema(config, "context_config")
                assert False, f"Config {i} should have failed validation"
            except Exception as e:
                # Проверяем что ошибки содержат полезную информацию
                error_msg = str(e)
                assert "config_version" in error_msg or "validation" in error_msg
                assert len(error_msg) > 20  # Сообщения не должны быть слишком краткими
