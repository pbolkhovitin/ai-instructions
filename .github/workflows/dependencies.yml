name: Python Syntax Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 1'   # еженедельно в понедельник (опционально)
  workflow_dispatch:       # ручной запуск

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']  # можно сократить до одной версии, если не нужна кросс-версионная проверка

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Check syntax with py_compile
      run: |
        echo "🔍 Проверка синтаксиса всех .py файлов (Python ${{ matrix.python-version }})"
        find . -name "*.py" -not -path "./.venv/*" -not -path "./venv/*" -exec python -m py_compile {} \;
